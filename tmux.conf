# Highlight the active pane with a different border color
set -g pane-active-border-style fg=green,bg=default

# Set the inactive pane border color
set -g pane-border-style fg=brightblack,bg=default

# Dim inactive panes to make the active one stand out more
set -g window-style fg=colour247,bg=colour236
set -g window-active-style fg=colour244,bg=colour234

# ==============================================================================
# Plugins (managed by TPM — ~/.tmux/plugins/tpm)
# TPM requires this env var to know where plugins live
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
# Install: prefix + I    Reload: prefix + r    Update: prefix + U
# ==============================================================================

# Persist sessions across restarts (manual: prefix + Ctrl-s to save, prefix + Ctrl-r to restore)
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Automatically save/restore sessions every 15 minutes
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

set -g mouse on

# Initialize TPM — must be the last line in this file
# If TPM is not installed, tmux still works; plugins just won't load
if "test -f ~/.tmux/plugins/tpm/tpm" \
   "run '~/.tmux/plugins/tpm/tpm'"
